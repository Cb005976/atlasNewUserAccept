<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Intelligence — Accept Invite</title>
    <style>
      :root {
        --bg: #050814;
        --panel: #111522;
        --panel-alt: #1a2030;
        --text: #f5f7fb;
        --muted: #9aa4b7;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
        --success: #22c55e;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #0c1430 0%, var(--bg) 45%);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .shell {
        width: 100%;
        max-width: 560px;
      }

      .card {
        background: rgba(17, 21, 34, 0.94);
        backdrop-filter: blur(18px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 26px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), #60a5fa);
        display: grid;
        place-items: center;
        font-weight: 800;
        color: white;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .subhead {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .status {
        margin: 18px 0 24px;
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--panel-alt);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
      }

      .status.error {
        border-color: rgba(239, 68, 68, 0.4);
        color: #fecaca;
      }

      .status.success {
        border-color: rgba(34, 197, 94, 0.4);
        color: #bbf7d0;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 8px;
        letter-spacing: 0.02em;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--panel-alt);
        color: var(--text);
        font-size: 15px;
        outline: none;
      }

      input:focus {
        border-color: rgba(59, 130, 246, 0.65);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
      }

      button {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 15px 18px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        background: var(--accent);
        color: white;
        transition: background 0.15s ease, transform 0.15s ease;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .footer-note {
        margin-top: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .hidden {
        display: none;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      code.inline {
        background: rgba(255,255,255,0.06);
        padding: 2px 6px;
        border-radius: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <h1>Accept Atlas Invite</h1>
            <p class="subhead">Set your password to finish joining your organization.</p>
          </div>
        </div>

        <div id="status" class="status">Checking your invite…</div>

        <div id="password-panel" class="hidden">
          <div class="meta" id="invite-email"></div>
          <form id="password-form" class="stack">
            <div>
              <label for="password">New Password</label>
              <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
            </div>
            <div>
              <label for="confirm-password">Confirm Password</label>
              <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" minlength="8" required />
            </div>
            <button id="submit-button" type="submit">Set Password & Continue</button>
          </form>
          <div class="footer-note">
            After your password is set, return to Atlas and sign in with your email and new password.
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // Replace these with your Atlas project values before deploying.
      const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';
      const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_OR_PUBLISHABLE_KEY';

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const statusEl = document.getElementById('status');
      const passwordPanel = document.getElementById('password-panel');
      const passwordForm = document.getElementById('password-form');
      const submitButton = document.getElementById('submit-button');
      const inviteEmailEl = document.getElementById('invite-email');

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      function getHashParams() {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
        return new URLSearchParams(hash);
      }

      async function establishInviteSession() {
        const url = new URL(window.location.href);
        const query = url.searchParams;
        const hash = getHashParams();

        const tokenHash = query.get('token_hash');
        const type = query.get('type');
        const email = query.get('email');

        // Flow A: custom invite link using token_hash + verifyOtp
        if (tokenHash && type === 'invite') {
          const { data, error } = await supabase.auth.verifyOtp({
            email: email ?? undefined,
            token_hash: tokenHash,
            type: 'invite'
          });

          if (error) throw error;

          const verifiedEmail = data.user?.email ?? email ?? '';
          return { email: verifiedEmail };
        }

        // Flow B: Supabase redirected here with tokens already in the hash
        const accessToken = hash.get('access_token');
        const refreshToken = hash.get('refresh_token');

        if (accessToken && refreshToken) {
          const { error: setSessionError } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });

          if (setSessionError) throw setSessionError;

          const { data: userData, error: userError } = await supabase.auth.getUser();
          if (userError) throw userError;

          return { email: userData.user?.email ?? '' };
        }

        // Flow C: session may already exist
        const { data: existingSession } = await supabase.auth.getSession();
        if (existingSession.session) {
          const { data: userData, error: userError } = await supabase.auth.getUser();
          if (userError) throw userError;
          return { email: userData.user?.email ?? '' };
        }

        throw new Error('Invite session could not be established. Please request a fresh invite email.');
      }

      async function initialize() {
        try {
          const { email } = await establishInviteSession();
          inviteEmailEl.textContent = email ? `Invite verified for ${email}` : 'Invite verified.';
          passwordPanel.classList.remove('hidden');
          setStatus('Invite verified. Set your password to finish setup.');
        } catch (error) {
          const message = error?.message || 'We could not verify this invite.';
          setStatus(message, 'error');
        }
      }

      passwordForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password.length < 8) {
          setStatus('Password must be at least 8 characters long.', 'error');
          return;
        }

        if (password !== confirmPassword) {
          setStatus('Passwords do not match.', 'error');
          return;
        }

        submitButton.disabled = true;
        setStatus('Saving your password…');

        try {
          const { error } = await supabase.auth.updateUser({ password });
          if (error) throw error;

          setStatus('Password set successfully. You can now return to Atlas and sign in.', 'success');
          passwordForm.classList.add('hidden');
        } catch (error) {
          setStatus(error?.message || 'Could not set password.', 'error');
          submitButton.disabled = false;
        }
      });

      initialize();
    </script>
  </body>
</html>
